services:
  fairpay:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-to-a-long-random-secret}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DB_PATH: /data/fairpay.sqlite
      PORT: 3000
    volumes:
      - fairpay-data:/data

volumes:
  fairpay-data:
